name: Fly Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Fly token
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "Missing GitHub Actions secret: FLY_API_TOKEN"
            echo "Create a Fly deploy token, then add it to this repo's Actions secrets."
            exit 1
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
